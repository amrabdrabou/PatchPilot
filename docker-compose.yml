# Defines local backend and frontend services for PatchPilot.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: patchpilot-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./.git:/app/.git:ro
      - ./backend:/app/backend
      - ./logs:/app/logs
      - ./test_project:/app/test_project
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: patchpilot-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_node_modules:
